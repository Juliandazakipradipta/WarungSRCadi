<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Warung SRC Adi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e3b5c, #0f2238);
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 400px;
            max-width: 100%;
            background: white;
            padding: 40px 32px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(15, 34, 56, 0.3);
            animation: cardEntrance 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h2 {
            font-size: 24px;
            font-weight: 800;
            color: #0f2238;
            letter-spacing: -0.5px;
        }
        .login-header h2 span {
            color: #38bdf8;
        }
        .login-header p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 6px;
        }
        .flash {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <h2>Warung <span>Adi</span></h2>
        <p>Silakan masuk ke akun Anda</p>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Masukkan username" autocomplete="username">
        </div>
        <div class="form-group" style="margin-bottom: 28px;">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Masukkan password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: 12px;">
            Masuk Sekarang
        </button>
    </form>
</div>

</body>
</html>
